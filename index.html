<script>
  // Remove preboot once root has children
  const tryHide = () => {
    const root = document.getElementById('root');
    if (root && root.children.length) {
      document.getElementById('preboot')?.classList.add('gone');
      setTimeout(() => document.getElementById('preboot')?.remove(), 400);
    } else {
      requestAnimationFrame(tryHide);
    }
  };
  requestAnimationFrame(tryHide);

  // Safety net: hard-hide preboot after 8 s even if mount fails
  setTimeout(() => {
    const pb = document.getElementById('preboot');
    if (pb) pb.classList.add('gone');
  }, 8000);
</script>
